apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: primalabs-app
  namespace: primalabs

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: primalabs-app

  minReplicas: 2
  maxReplicas: 5

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70